name: firetrack
description: Yangın tüpü takip ve yönetim uygulaması.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^8.1.0
  fl_chart: ^0.70.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  cross_file: ^0.3.5+2
  uuid: ^4.5.1
  supabase_flutter: ^2.9.1
  shared_preferences: ^2.5.3
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # klasör bazlı + slider mock'ları açıkça (web debug'da yeni dosya için flutter run tam restart şart, R yetmez)
    - assets/images/header/
    - assets/images/header/tupdolummock2.png
    - assets/images/header/celikburunmock2.png
    - assets/images/header/kaskmock2.png
    - assets/images/header/detektormock3.png
